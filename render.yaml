services:
  - type: web
    name: mckcode-menu-backend
    runtime: python
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 10000
    # -------------------------------------------------------
    # FREE TIER: data resets on each redeploy / spin-down.
    # To persist data across deploys, upgrade to a paid plan,
    # add a Render Disk below, and set DATA_DIR=/data.
    # -------------------------------------------------------
    # disk:
    #   name: menu-data
    #   mountPath: /data
    #   sizeGB: 1
    # envVars:
    #   - key: DATA_DIR
    #     value: /data
